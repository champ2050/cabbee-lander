<div class="container">
  <h1>Mumbai Outstation Taxi</h1>
  <p>24/7 Phone Booking</p>
  <a class="call-btn" id="callButton" href="tel:+919999999999">Call Now</a>
</div>

<script>
// Capture gclid from URL and store in cookie
function getParam(param) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(param);
}

const gclid = getParam("gclid");
if (gclid) {
  const expiryDate = new Date();
  expiryDate.setDate(expiryDate.getDate() + 90);
  document.cookie = "gclid=" + gclid + "; expires=" + expiryDate.toUTCString() + "; path=/";
}

function getCookie(name) {
  const value = "; " + document.cookie;
  const parts = value.split("; " + name + "=");
  if (parts.length === 2) return parts.pop().split(";").shift();
}

// Send GCLID to Google Sheet when call button is clicked
document.getElementById("callButton").addEventListener("click", function() {
  const storedGclid = getCookie("gclid");
  const data = {
    gclid: storedGclid || "",
    keyword: ""
  };

  fetch("YOUR_WEB_APP_URL", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => console.log("Lead sent:", res))
  .catch(err => console.error("Error sending lead:", err));
});
</script>
