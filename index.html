<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cabbee | Official Site</title>
  <meta name="description" content="Cabbee official site. Choose outstation rides or driver hiring.">

  <link rel="icon" type="image/png" sizes="64x64" href="/images/common/favicon.png">
  <link rel="shortcut icon" type="image/png" href="/images/common/favicon.png">
  <link rel="apple-touch-icon" href="/images/common/favicon.png">
  <meta name="msapplication-TileImage" content="/images/common/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
    onload="this.rel='stylesheet'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </noscript>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #181c20;
      --grey: #6b7280;
      --lgrey: #f3f4f6;
      --border: #e5e7eb;
      --green: #1a8a3c;
      --green-d: #146e30;
      --green-l: #dcfce7;
      --green-b: #a7f3c0;
      --yellow: #f59e0b;
      --yel-l: #fffbeb;
      --white: #ffffff;
      --gap: 12px;
      --r: 10px;
      --font: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    html,
    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      flex-shrink: 0;
      padding: 10px 24px;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 0 var(--border), 0 2px 8px rgba(0, 0, 0, 0.05);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--black);
      line-height: 1;
      position: relative;
      display: inline-block;
      padding-right: 9px;
    }

    .logo-dot {
      position: absolute;
      top: 2px;
      right: 0;
      width: 6px;
      height: 6px;
      background: var(--yellow);
      border-radius: 50%;
    }

    .avail-pill {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green-l);
      border: 1px solid var(--green-b);
      color: var(--green-d);
      font-size: 11px;
      font-weight: 700;
      padding: 5px 11px;
      border-radius: 100px;
      white-space: nowrap;
    }

    .avail-pulse {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      flex-shrink: 0;
      animation: gpulse 2s ease-in-out infinite;
    }

    @keyframes gpulse {
      0%,
      100% {
        transform: scale(0.9);
        opacity: 0.7;
      }
      50% {
        transform: scale(1.4);
        opacity: 1;
      }
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 56px 20px 40px;
      text-align: center;
    }

    .hero-inner {
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .hero h1 {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .hero p {
      color: var(--grey);
      font-size: 15px;
      line-height: 1.6;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 6px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid transparent;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    .cta.primary {
      background: var(--green);
      color: var(--white);
      box-shadow: 0 12px 24px rgba(26, 138, 60, 0.22);
    }

    .cta.secondary {
      background: var(--white);
      color: var(--black);
      border-color: var(--border);
    }

    .cta:hover {
      transform: translateY(-1px);
    }

    .footer {
      flex-shrink: 0;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      text-align: center;
      margin-top: 4px;
    }

    .footer p {
      font-size: 11px;
      color: #b0b8c1;
    }

    .footer a {
      color: #b0b8c1;
      text-decoration: none;
    }

    .footer a:hover {
      color: var(--grey);
    }

    /* ── MODALS ── */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.open {
      display: flex;
    }

    .modal-box {
      background: var(--white);
      border-radius: 12px;
      padding: 28px 24px;
      max-width: 440px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      scrollbar-width: thin;
      scrollbar-color: #d1d5db transparent;
    }

    .modal-box::-webkit-scrollbar {
      width: 6px;
    }

    .modal-box::-webkit-scrollbar-track {
      background: transparent;
      border-radius: 0 12px 12px 0;
    }

    .modal-box::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    .modal-box::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    .modal-box h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--black);
    }

    .modal-box p {
      font-size: 13px;
      color: var(--grey);
      line-height: 1.65;
      margin-bottom: 10px;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 18px;
      font-size: 22px;
      color: var(--grey);
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      font-family: var(--font);
    }

    .modal-close:hover {
      color: var(--black);
    }

    @media (max-width: 600px) {
      .topbar {
        padding: 10px 16px;
      }

      .hero {
        padding: 44px 16px 32px;
      }

      .cta {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="topbar">
      <span class="logo-text" aria-label="Cabbee">Cabbee<span class="logo-dot"></span></span>
      <span class="avail-pill">
        <span class="avail-pulse"></span>
        Official site
      </span>
    </header>

    <main class="hero">
      <div class="hero-inner">
        <h1>Cabbee made simple.</h1>
        <p>Pick the page you need and get going in seconds.</p>
        <div class="cta-row">
          <a class="cta primary" href="./outstation/">Outstation Cabs</a>
          <a class="cta secondary" href="./hire/">Hire Drivers</a>
        </div>
      </div>
    </main>

        <div id="site-footer"></div>
  </div>

<script src="./footer.js"></script>
  <script>
    (function () {
      'use strict';

      var yr = new Date().getFullYear();
      var footerYearEl = document.getElementById('footerYear');
      if (footerYearEl) footerYearEl.textContent = yr;

      var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      var now = new Date();
      var monthYear = months[now.getMonth()] + ' ' + now.getFullYear();
      var pd = document.getElementById('privacyDate');
      var td = document.getElementById('termsDate');
      if (pd) pd.textContent = monthYear;
      if (td) td.textContent = monthYear;

      window.openModal = function (id) {
        var m = document.getElementById(id);
        if (m) m.classList.add('open');
      };

      window.closeModal = function (id) {
        var m = document.getElementById(id);
        if (m) m.classList.remove('open');
      };

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          var open = document.querySelector('.modal.open');
          if (open) open.classList.remove('open');
        }
      });
    })();
  </script>
</body>

</html>
