<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mumbai Outstation Taxi Booking</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;
  background: #ffffff;
}
.container {
  padding: 40px 20px;
}
h1 {
  font-size: 28px;
}
.call-btn {
  display: inline-block;
  margin-top: 30px;
  padding: 18px 30px;
  font-size: 20px;
  color: #fff;
  background: #0a7cff;
  text-decoration: none;
  border-radius: 8px;
}
</style>
</head>
<body>
<div class="container">
  <h1>Mumbai Outstation Taxi</h1>
  <p>24/7 Phone Booking</p>
  <a class="call-btn" href="tel:+919999999999">Call Now</a>
</div>
<script>
// --- Capture URL params ---
function getParam(param) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(param);
}

// --- Store all params in cookies (90 day expiry) ---
function setCookie(name, value) {
  const expiryDate = new Date();
  expiryDate.setDate(expiryDate.getDate() + 90);
  document.cookie = name + "=" + value + "; expires=" + expiryDate.toUTCString() + "; path=/";
}

const params = ["gclid", "keyword", "utm_source", "utm_medium", "utm_campaign"];
params.forEach(function(param) {
  const val = getParam(param);
  if (val) setCookie(param, val);
});

// --- Retrieve cookie ---
function getCookie(name) {
  const value = "; " + document.cookie;
  const parts = value.split("; " + name + "=");
  if (parts.length === 2) return parts.pop().split(";").shift();
}

// --- Send all data to Google Sheet on page load ---
const storedGclid = getCookie("gclid");
if (storedGclid) {
  fetch("https://script.google.com/macros/s/AKfycbzq7TmxCA1Wogb1ZKYbJx6ewhy49rT_w0IDmXMc3OEEuqEkLMjVmnoiKMn9mSXvpS-exQ/exec", {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({
      gclid:        storedGclid,
      keyword:      getCookie("keyword") || "",
      utm_source:   getCookie("utm_source") || "",
      utm_medium:   getCookie("utm_medium") || "",
      utm_campaign: getCookie("utm_campaign") || ""
    })
  })
  .then(res => res.json())
  .then(res => console.log("Lead logged:", res))
  .catch(err => console.error("Error logging lead:", err));
}
</script>
</body>
</html>
