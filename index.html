<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mumbai Outstation Taxi Booking</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;
  background: #ffffff;
}
.container {
  padding: 40px 20px;
}
h1 {
  font-size: 28px;
}
.call-btn {
  display: inline-block;
  margin-top: 30px;
  padding: 18px 30px;
  font-size: 20px;
  color: #fff;
  background: #0a7cff;
  text-decoration: none;
  border-radius: 8px;
}
</style>
</head>
<body>
<div class="container">
<h1>Mumbai Outstation Taxi</h1>
<p>24/7 Phone Booking</p>
<a class="call-btn" href="tel:+919999999999">Call Now</a>
</div>
<script>
function getParam(param) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(param);
}

// Capture gclid from URL
const gclid = getParam("gclid");

if (gclid) {
  const expiryDate = new Date();
  expiryDate.setDate(expiryDate.getDate() + 90);
  document.cookie = "gclid=" + gclid + "; expires=" + expiryDate.toUTCString() + "; path=/";
}

// Retrieve stored gclid
function getCookie(name) {
  const value = "; " + document.cookie;
  const parts = value.split("; " + name + "=");
  if (parts.length === 2) return parts.pop().split(";").shift();
}

const storedGclid = getCookie("gclid");

// Attach to call button (optional logging use)
if (storedGclid) {
  console.log("GCLID captured:", storedGclid);
}
</script>
</body>
</html>
